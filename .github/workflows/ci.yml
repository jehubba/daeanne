name: CI — Build & Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - 'src/**'
      - '.github/workflows/ci.yml'

permissions:
  contents: read

env:
  DOTNET_VERSION: '8.0.x'

jobs:
  build:
    name: Build solution
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore src/Daeanne.slnx

      - name: Build
        run: dotnet build src/Daeanne.slnx --configuration Release --no-restore
