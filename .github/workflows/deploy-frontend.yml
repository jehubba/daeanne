name: Deploy Daeanne Frontend

on:
  push:
    branches: [feat/daeanne-frontend]
    paths:
      - "src/Daeanne.Frontend/**"
      - "src/Daeanne.Shared/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build Client
        run: dotnet publish src/Daeanne.Frontend/Client/DaeanneFrontend.Client.csproj -c Release -o client-publish

      - name: Copy staticwebapp.config.json
        run: cp src/Daeanne.Frontend/staticwebapp.config.json client-publish/wwwroot/staticwebapp.config.json

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: client-publish/wwwroot
          skip_app_build: true
