<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Access Denied - Daeanne</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            max-width: 480px;
            padding: 2rem;
        }
        h1 { color: #bb86fc; margin-bottom: 0.5rem; }
        p { color: #aaa; line-height: 1.6; }
        a {
            color: #bb86fc;
            text-decoration: none;
            border: 1px solid #bb86fc;
            padding: 0.5rem 1.5rem;
            border-radius: 4px;
            display: inline-block;
            margin-top: 1rem;
        }
        a:hover { background: #bb86fc22; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Access Denied</h1>
        <p>Your account does not have permission to access Daeanne. If you believe this is an error, contact the administrator.</p>
        <a href="/.auth/logout">Sign out</a>
    </div>
</body>
</html>
